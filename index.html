<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yusuff Business</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Helvetica Neue', sans-serif;
    background: #ffffff;
    color: #111;
}

/* NAVBAR */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    border-bottom: 1px solid #eee;
}

header h1 {
    font-weight: 600;
    letter-spacing: 2px;
}

nav a {
    margin-left: 30px;
    text-decoration: none;
    color: #111;
    font-size: 14px;
}

nav a:hover {
    opacity: 0.6;
}

/* HERO */
.hero {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1521335629791-ce4aec67dd47') no-repeat center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hero-text {
    background: rgba(255,255,255,0.85);
    padding: 40px;
    text-align: center;
}

.hero-text h2 {
    font-size: 40px;
    margin-bottom: 15px;
}

.hero-text p {
    margin-bottom: 20px;
    color: #555;
}

.btn {
    padding: 10px 25px;
    border: 1px solid black;
    background: transparent;
    cursor: pointer;
}

.btn:hover {
    background: black;
    color: white;
}

/* COLLECTION */
.section {
    padding: 80px 60px;
    text-align: center;
}

.products {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 40px;
}

.product {
    width: 250px;
}

.product img {
    width: 100%;
}

.product h3 {
    margin-top: 10px;
    font-size: 16px;
}

.product p {
    color: #777;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    border-top: 1px solid #eee;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <h1>YUSUFF</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h2>Yusuff Business</h2>
        <p>Minimal. Modern. Timeless.</p>
        <button class="btn">Shop Now</button>
    </div>
</section>

<section class="section">
    <h2>New Collection</h2>

    <div class="products">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
            <h3>Minimal White Tee</h3>
            <p>₹999</p>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
            <h3>Black Oversized Hoodie</h3>
            <p>₹1999</p>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
            <h3>Denim Jacket</h3>
            <p>₹2499</p>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
            <h3>Classic Shirt</h3>
            <p>₹1499</p>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1520975922323-8b0c8c8c7f0c">
            <h3>Streetwear Cargo Pants</h3>
            <p>₹2199</p>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1593032465171-8c2b5c0c7b0b">
            <h3>Casual Sweatshirt</h3>
            <p>₹1799</p>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Yusuff Business</p>
</footer>

</body>
</html>
