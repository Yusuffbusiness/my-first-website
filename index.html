<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        header h1 {
            color: #00ffcc;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00ffcc;
        }

        .hero {
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .hero h2 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .hero span {
            color: #00ffcc;
        }

        .hero p {
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            background: #00ffcc;
            color: black;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        .section {
            padding: 80px 50px;
            text-align: center;
        }

        .cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: #1a1a1a;
            padding: 20px;
            width: 250px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: #222;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #111;
            margin-top: 50px;
        }
    </style>
</head>

<body>

<header>
    <h1>MySite</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Hi, I'm <span>Your Name</span></h2>
    <p>I build cool websites 🚀</p>
    <button class="btn">Explore</button>
</section>

<section class="section">
    <h2>What I Do</h2>

    <div class="cards">
        <div class="card">
            <h3>Web Design</h3>
            <p>Modern and clean UI design</p>
        </div>

        <div class="card">
            <h3>Development</h3>
            <p>Fast and responsive websites</p>
        </div>

        <div class="card">
            <h3>Projects</h3>
            <p>Creative and unique ideas</p>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 My Website | Built with ❤️</p>
</footer>

</body>
</html>
